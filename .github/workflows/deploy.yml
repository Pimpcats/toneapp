name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/leanbuild-workout-app-RdodQ
      - main
    # The image-fetch workflow does its own build + deploy, so don't also fire
    # this one for those changes (they share the "pages" concurrency group).
    paths-ignore:
      - 'scripts/fetch-images.mjs'
      - '.github/workflows/fetch-images.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs of the same group.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
