name: Fetch exercise images

# Manually-triggered job that pulls open-licensed exercise photos from
# free-exercise-db (public domain) and commits them to the repo. Pushing the
# new images to the default branch triggers the Pages deploy workflow.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Download and match images
        run: node scripts/fetch-images.mjs
      - name: Commit images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/exercises
          if git diff --cached --quiet; then
            echo "No image changes to commit."
          else
            git commit -m "Add open-licensed exercise photos (free-exercise-db, public domain)"
            git push
          fi
